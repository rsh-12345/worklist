const TODAY = "2026-07-15";

function parseDate(s) {
  if (!s) return null;
  const parts = s.split('-');
  return new Date(+parts[0], +parts[1] - 1, +parts[2]);
}

function isOverdue(dl) {
  if (!dl) return false;
  const d = parseDate(dl);
  if (!d) return false;
  return d < parseDate(TODAY);
}

function isToday(dl) {
  return dl && dl === TODAY;
}

function isTomorrow(dl) {
  if (!dl) return false;
  const t = parseDate(TODAY);
  if (!t) return false;
  t.setDate(t.getDate() + 1);
  const y = t.getFullYear();
  const m = String(t.getMonth() + 1).padStart(2, '0');
  const d = String(t.getDate()).padStart(2, '0');
  return dl === y + '-' + m + '-' + d;
}

function fmtDate(dl) {
  return dl ? dl.replace(/-/g, '/') : '';
}

function fmtCompleted(iso) {
  if (!iso) return '';
  const d = iso.split('T')[0];
  const t = iso.split('T')[1].split('.')[0];
  return d.replace(/-/g, '/') + ' ' + t.substring(0,5);
}

function render() {
  // Group by project
  const projects = {};
  DATA.forEach(item => {
    if (!projects[item.project_name]) {
      projects[item.project_name] = { active: [], done: [] };
    }
    if (item.status === 'completed') {
      projects[item.project_name].done.push(item);
    } else {
      projects[item.project_name].active.push(item);
    }
  });

  // Sort projects: most active items first
  const projNames = Object.keys(projects).sort((a, b) => {
    return projects[b].active.length - projects[a].active.length;
  });

  // Summary
  const total = DATA.length;
  const done = DATA.filter(i => i.status === 'completed').length;
  const active = total - done;
  const overdue = DATA.filter(i => i.status !== 'completed' && isOverdue(i.deadline)).length;
  const dueToday = DATA.filter(i => i.status !== 'completed' && isToday(i.deadline)).length;

  document.getElementById('summary').innerHTML =
    `<div class="summary-item">总计 <strong>${total}</strong> 项</div>` +
    `<div class="summary-item">待处理 <strong class="orange">${active}</strong></div>` +
    `<div class="summary-item">已逾期 <strong class="red">${overdue}</strong></div>` +
    `<div class="summary-item">今日到期 <strong class="orange">${dueToday}</strong></div>` +
    `<div class="summary-item">已完成 <strong class="green">${done}</strong></div>`;

  document.getElementById('meta').innerHTML = `<span>${projNames.length} 个项目</span>`;

  // 显示构建时间作为更新时间
  document.getElementById('updated').textContent =
    '数据更新于 ' + BUILD_TIME.replace(/-/g, '/').substring(0, 16);

  let html = '';
  projNames.forEach(name => {
    const p = projects[name];
    const urgentCount = p.active.filter(i => i.priority === 'urgent').length;
    const overdueCount = p.active.filter(i => isOverdue(i.deadline)).length;
    const doneCount = p.done.length;

    let badges = '';
    if (overdueCount > 0) badges += `<span class="badge badge-overdue">逾期 ${overdueCount}</span>`;
    if (urgentCount > 0) badges += `<span class="badge badge-urgent">紧急 ${urgentCount}</span>`;
    if (doneCount > 0) badges += `<span class="badge badge-done">已完成 ${doneCount}</span>`;

    html += `<div class="card">`;
    html += `<div class="card-header"><h2>${name}</h2><div class="badges">${badges}</div></div>`;
    html += `<div class="item-list">`;

    if (p.active.length === 0) {
      html += `<div class="empty">暂无待处理事项</div>`;
    } else {
      // Sort active: urgent first, then by deadline
      const sorted = [...p.active].sort((a, b) => {
        if (a.priority === 'urgent' && b.priority !== 'urgent') return -1;
        if (b.priority === 'urgent' && a.priority !== 'urgent') return 1;
        return (a.deadline || '9999').localeCompare(b.deadline || '9999');
      });

      sorted.forEach(item => {
        const cls = item.status === 'in_progress' ? 'in_progress' : '';
        const dotCls = item.status === 'in_progress' ? 'in_progress' : 'pending';
        let dlText = '';
        let dlClass = '';
        if (!item.deadline) {
          dlText = '';
          dlClass = '';
        } else if (isOverdue(item.deadline)) {
          const days = Math.floor((parseDate(TODAY) - parseDate(item.deadline)) / (1000*60*60*24));
          dlText = '已逾期 ' + days + ' 天';
          dlClass = 'overdue-text';
        } else if (isToday(item.deadline)) {
          dlText = '今天截止';
          dlClass = 'due-today-text';
        } else if (isTomorrow(item.deadline)) {
          dlText = '明天截止';
        } else {
          dlText = fmtDate(item.deadline) + ' 截止';
        }

        const prioTag = item.priority === 'urgent'
          ? '<span class="tag" style="color:#cf1322">⚡紧急</span>' : '';

        html += `<div class="item ${cls}">`;
        html += `<div class="status-dot ${dotCls}"></div>`;
        html += `<div class="item-body">`;
        html += `<div class="content">${esc(item.content)}</div>`;
        html += `<div class="meta-line">${prioTag}${dlText ? `<span class="tag ${dlClass}">📅 ${dlText}</span>` : ''}</div>`;
        html += `</div></div>`;
      });
    }

    html += `</div>`;

    // Done section
    if (p.done.length > 0) {
      html += `<div class="done-section">`;
      html += `<div class="done-label">✅ 已完成 (${p.done.length})</div>`;
      p.done.forEach(item => {
        html += `<div class="item">`;
        html += `<div class="status-dot completed"></div>`;
        html += `<div class="item-body">`;
        html += `<div class="content">${esc(item.content)}</div>`;
        html += `<div class="meta-line">完成于 ${fmtCompleted(item.completed_at)}</div>`;
        html += `</div></div>`;
      });
      html += `</div>`;
    }

    html += `</div>`;
  });

  document.getElementById('grid').innerHTML = html;
}

function esc(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

render();
} // end initApp
</script>
</body>
</html>
